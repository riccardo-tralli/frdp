name: frdp
description: 'Flutter plugin for Remote Desktop Protocol (RDP) connections'
version: 0.1.0
homepage: https://github.com/riccardo-tralli/frdp
repository: https://github.com/riccardo-tralli/frdp/tree/main
issue_tracker: https://github.com/riccardo-tralli/frdp/issues
topics:
    - rdp
    - remote-desktop
    - utils

environment:
    sdk: ^3.10.4
    flutter: '>=3.3.0'

dependencies:
    flutter:
        sdk: flutter
    plugin_platform_interface: ^2.0.2

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

flutter:
    plugin:
        platforms:
            macos:
                pluginClass: FrdpPlugin
